        <section id="access-section"
            class="min-h-[calc(100vh-81px)] py-10 bg-white flex items-center relative overflow-hidden">
            <!-- Background Decorative Element -->
            <div class="absolute -top-24 -right-24 w-96 h-96 bg-gold/5 rounded-full blur-3xl opacity-50"></div>
            <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl opacity-50"></div>

            <div class="max-w-[1440px] mx-auto px-6 lg:px-12 w-full relative z-10">
                <div class="grid grid-cols-1 lg:grid-cols-[1.4fr_1fr] gap-12 lg:gap-24 items-center">
                    <!-- Left Section -->
                    <div class="lg:pr-10">
                        <span
                            class="text-[10px] font-black uppercase tracking-[0.5em] text-gold block mb-6 reveal-subtitle">Welcome</span>
                        <h1
                            class="font-serif text-5xl md:text-7xl lg:text-8xl text-primary leading-[1.2] tracking-tight mb-6 reveal-title">
                            Museum of <br><span class="italic font-light text-gold">Contemporary</span> Art
                        </h1>
                        <div class="w-16 h-[1.5px] bg-gold mt-4 mb-8 rounded-full reveal-line"></div>
                        <p
                            class="text-secondary text-xl md:text-2xl font-light max-w-xl mb-10 leading-relaxed reveal-text">
                            Gandhinagar, India.
                        </p>
                    </div>

                    <!-- Right Section (Form) -->
                    <div
                        class="bg-surface p-8 md:p-11 rounded-[48px] shadow-[0_40px_100px_rgba(0,0,0,0.05)] border border-black/5 reveal-card">
                        <form class="flex flex-col gap-6">
                            <div class="flex flex-col gap-2">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-secondary ml-1">Full
                                    Name</label>
                                <input type="text" placeholder="Aarav Sharma"
                                    class="w-full bg-white border-none rounded-2xl px-6 py-4 text-sm focus:ring-1 focus:ring-gold/50 outline-none transition-all">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-secondary ml-1">Mobile
                                    Number</label>
                                <input type="tel" placeholder="+91 00000 00000"
                                    class="w-full bg-white border-none rounded-2xl px-6 py-4 text-sm focus:ring-1 focus:ring-gold/50 outline-none transition-all">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-secondary ml-1">Email
                                    Address</label>
                                <input type="email" placeholder="aarav@artcollector.com"
                                    class="w-full bg-white border-none rounded-2xl px-6 py-4 text-sm focus:ring-1 focus:ring-gold/50 outline-none transition-all">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-secondary ml-1">City /
                                    State</label>
                                <input type="text" placeholder="Gandhinagar, Gujarat"
                                    class="w-full bg-white border-none rounded-2xl px-6 py-4 text-sm focus:ring-1 focus:ring-gold/50 outline-none transition-all">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-secondary ml-1">Your
                                    Message</label>
                                <textarea rows="4" placeholder="Tell us about your interest..."
                                    class="w-full bg-white border-none rounded-2xl px-6 py-4 text-sm focus:ring-1 focus:ring-gold/50 outline-none transition-all resize-none"></textarea>
                            </div>
                            <div class="pt-4">
                                <button type="submit"
                                    class="bg-primary text-white w-full py-5 rounded-full text-xs font-black uppercase tracking-widest hover:bg-gold transition-all shadow-xl flex items-center justify-center gap-4 group">
                                    Access the Website <i
                                        class="fas fa-arrow-right text-[10px] group-hover:translate-x-1 transition-transform"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
